<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5.serialport@0.0.31/lib/p5.serialport.min.js"></script>
</head>
<body>
  <script>
    // Connection variables:
    // Configures the variables required 
    // for Serial communication.
    let serial;
    let portName = 'COM7'; // Replace with your port

    // Initialization:
    // Opens the serial port communication 
    // without creating a visible canvas.
    function setup() {
      noCanvas();
      serial = new p5.SerialPort();
      serial.openPort(portName);
    }
  </script>
</body>
</html>
