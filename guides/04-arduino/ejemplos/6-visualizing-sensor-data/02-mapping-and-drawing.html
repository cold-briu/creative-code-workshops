<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.js"></script>
  <script src="https://unpkg.com/p5.serialserver@0.0.28/lib/p5.serialport.js"></script>
</head>
<body>
  <script>
    // Visual and Connection variables:
    // Defines the canvas dimensions and 
    // variables for Serial communication.
    let width = 800;
    let height = 600;
    let serial;
    let portName = 'COM7'; // Replace with your port
    let x = 400, y = 300;

    // Initialization:
    // Creates the drawing surface and 
    // opens the serial communication.
    function setup() {
      createCanvas(width, height);
      serial = new p5.SerialPort();
      serial.openPort(portName);
    }

    function draw() {
      // Refresh Frame:
      // Clears the canvas with a dark color.
      background(10);
      
      // Data Processing:
      // Reads incoming data and splits it by 
      // commas to get individual sensor values.
      let data = serial.readLine();
      
      if (data.length > 0) {
        let values = data.split(",");
        
        if (values.length >= 3) {
          // Mapping Coordinate Values:
          // Converts sensor range (0-1023) to 
          // screen dimensions (pixels).
          x = map(Number(values[0]), 0, 1023, 0, width);
          y = map(Number(values[1]), 0, 1023, 0, height);
          
          // Interaction Logic:
          // Changes the fill color depending 
          // on the joystick button's digital state.
          if (values[2].trim() == "0") {
            fill("#ff00ea");
          } else {
            fill("#00ff64");
          }
        }
      }

      // Visual Representation:
      // Draws a circle at the mapped 
      // position without an outline.
      noStroke();
      circle(x, y, 60);
    }
  </script>
</body>
</html>
