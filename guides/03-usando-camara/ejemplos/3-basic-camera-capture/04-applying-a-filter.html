<!DOCTYPE html>
<html lang="en">

<!-- The Brain:
     Contains settings, metadata, and the title. -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p5.js Camera</title>

  <!-- Global Styles: 
       Sets the font for the entire document. -->
  <style>
    body {
      font-family: Helvetica, sans-serif;
    }
  </style>

  <!-- P5.js Library:
       Importing the library from the CDN source. -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
</head>

<!-- The Body:
     Contains all visible elements on the page. -->

<body>

  <!-- Main Title:
       Displays the name of the project. -->
  <h1>p5.js Camera</h1>

  <!-- P5.js Sketch:
       Defines the drawing functions for the project. -->
  <script>
    // Variables for Canvas Size:
    // Defined here to be reused throughout the sketch.
    let width = 400;
    let height = 400;

    // Video Capture Variable:
    // This variable will store the camera's 
    // video stream.
    let video;

    // Setup Function: 
    // Runs once at the start to create the drawing canvas.
    function setup() {
      createCanvas(width, height);

      // Camera Capture Configuration:
      // Accesses the webcam, sets its resolution 
      // to match the canvas, and hides the original element.
      video = createCapture(VIDEO);
      video.size(width, height);
      video.hide();
    }

    // Draw Function: 
    // Runs 60 times per second to render background and elements.
    function draw() {
      background(220);

      // Draw Video onto Canvas:
      // Renders the current frame of the video stream 
      // at coordinates (0, 0) inside the canvas.
      image(video, 0, 0);

      // Apply Posterize Filter:
      // Reduces the number of colors in the image 
      // to create a graphic effect (3 levels).
      filter(POSTERIZE, 3);
    }
  </script>
</body>

</html>
