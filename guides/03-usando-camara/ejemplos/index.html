<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
</head>

<body>
    <h1>My Creative Sketch</h1>

    <script>

        let captura
        let w = 400
        let h = 400
        let size = 10

        function setup() {
            frameRate(30)
            createCanvas(w, h);
            captura = createCapture(VIDEO)


        }

        function draw() {
            background(220);
            image(captura, 0, 0)
            filter(POSTERIZE)

        }

    </script>
</body>

</html>
